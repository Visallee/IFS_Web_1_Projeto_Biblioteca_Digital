{% extends 'base.html' %}
{% block titulo %}Cadastro — Biblioteca Digital{% endblock %}
{% block conteudo %}
<div style="max-width: 480px; margin: 0 auto;">
    <div class="card">
        <h1>Criar Conta</h1>
        <p style="color:#555; margin-bottom:1.2rem;">Cadastre-se para acessar o acervo.</p>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width:100%">Cadastrar</button>
        </form>
        <p style="margin-top:1rem; text-align:center;">Já tem conta? <a href="{% url 'accounts:login' %}">Entrar</a></p>
    </div>
</div>
{% endblock %}
