{% extends 'base.html' %}
{% block titulo %}Login — Biblioteca Digital{% endblock %}
{% block conteudo %}
<div style="max-width: 420px; margin: 0 auto;">
    <div class="card">
        <h1>Entrar</h1>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width:100%">Entrar</button>
        </form>
        <p style="margin-top:1rem; text-align:center;">Não tem conta? <a href="{% url 'accounts:cadastro' %}">Cadastrar</a></p>
    </div>
</div>
{% endblock %}
