{% extends 'base.html' %}
{% block titulo %}Meu Perfil{% endblock %}
{% block conteudo %}
<div style="max-width:560px; margin:0 auto;">
    <h1>Meu Perfil</h1>
    <div class="card">
        <p style="color:#555; margin-bottom:1.2rem;">Usuário: <strong>{{ user.username }}</strong></p>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">Salvar Alterações</button>
            <a href="{% url 'biblioteca:lista_livros' %}" class="btn btn-secondary">Voltar</a>
        </form>
    </div>
</div>
{% endblock %}
