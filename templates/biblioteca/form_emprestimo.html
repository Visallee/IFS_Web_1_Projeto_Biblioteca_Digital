{% extends 'base.html' %}
{% block titulo %}Novo Empréstimo{% endblock %}
{% block conteudo %}
<div style="max-width:560px; margin:0 auto;">
    <h1>Solicitar Empréstimo</h1>
    <div class="card">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-success">Confirmar Empréstimo</button>
            <a href="{% url 'biblioteca:lista_livros' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
